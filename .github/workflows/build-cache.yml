name: Build Cache
on:
  workflow_dispatch:
jobs:
  build-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run build-cache
        run: node build-cache.js
        env:
          BLUESKY_URL: https://bsky.social
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          RSS_FEED: https://www.reddit.com/r/nosotrosoelcaos/.rss
          CACHE_FILE: cache.json
      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json
          git diff --staged --quiet || (git commit -m "Rebuild cache from Bluesky history [skip ci]" && git push)
