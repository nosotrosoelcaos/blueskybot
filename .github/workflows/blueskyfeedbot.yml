name: FeedBot
on:
  schedule:
    # This will run every five minutes. Alter it using https://crontab.guru/.
    - cron: '*/5 * * * *'
  workflow_dispatch: # This allows manually running the workflow from the GitHub actions page
jobs:
  rss-to-bluesky:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: FeedBot
        uses: 'nosotrosoelcaos/blueskyfeedbot@main'
        with:
          rss-feed: https://www.reddit.com/r/nosotrosoelcaos/.rss
          template: |
            {{item.title}}
          service-url: https://bsky.social
          username: ${{ secrets.BLUESKY_USERNAME }}
          password: ${{ secrets.BLUESKY_PASSWORD }}
          cache-file: ${{ github.workspace }}/cache.json
          cache-limit: '100000'
          initial-post-limit: 10000
          #dry-run: 'true'
      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json
          git diff --staged --quiet || (git commit -m "Update cache [skip ci]" && git push)
